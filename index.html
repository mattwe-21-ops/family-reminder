<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Family Reminder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Family Reminder</h1>
    <p>Liste condivise per tutta la famiglia</p>
  </header>

  <main class="app-main">
    <section class="lists-panel">
      <div class="lists-header">
        <h2>Liste</h2>
        <button id="newListBtn">+ Nuova lista</button>
      </div>
      <ul id="listsContainer"></ul>
    </section>

    <section class="tasks-panel">
      <div class="tasks-header">
        <div>
          <h2 id="currentListName">Seleziona una lista</h2>
          <p id="currentListMeta"></p>
        </div>
        <button id="newTaskBtn">+ Nuovo promemoria</button>
      </div>

      <div class="tasks-filters">
        <button data-filter="today">Oggi</button>
        <button data-filter="upcoming">Prossimi</button>
        <button data-filter="all" class="active">Tutti</button>
      </div>

      <ul id="tasksContainer"></ul>
    </section>
  </main>

  <!-- Modale nuova lista -->
  <div class="modal" id="listModal">
    <div class="modal-content">
      <h3>Nuova lista</h3>
      <label>Nome lista
        <input type="text" id="listNameInput" />
      </label>
      <label>Colore
        <input type="color" id="listColorInput" value="#007aff" />
      </label>
      <label>Icona (emoji)
        <input type="text" id="listIconInput" placeholder="🧺" />
      </label>
      <div class="modal-actions">
        <button id="listCancelBtn">Annulla</button>
        <button id="listSaveBtn">Salva</button>
      </div>
    </div>
  </div>

  <!-- Modale nuovo promemoria -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <h3>Nuovo promemoria</h3>

      <label>Titolo
        <input type="text" id="taskTitleInput" />
      </label>

      <label>Note
        <textarea id="taskNotesInput" rows="3"></textarea>
      </label>

      <div class="two-cols">
        <label>Data
          <input type="date" id="taskDateInput" />
        </label>
        <label>Ora
          <input type="time" id="taskTimeInput" />
        </label>
      </div>

      <div class="two-cols">
        <label>Priorità
          <select id="taskPriorityInput">
            <option value="none">Nessuna</option>
            <option value="low">Bassa</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
          </select>
        </label>
        <label>Tag (es. #spesa #nonna)
          <input type="text" id="taskTagsInput" />
        </label>
      </div>

      <label>Ripetizione
        <select id="taskRepeatInput">
          <option value="none">Nessuna</option>
          <option value="daily">Ogni giorno</option>
          <option value="weekly">Ogni settimana</option>
          <option value="monthly">Ogni mese</option>
        </select>
      </label>

      <label>Sub-attività (separate da “;”)
        <input type="text" id="taskSubtasksInput" placeholder="es. compra latte; compra pane" />
      </label>

      <label>Allegato (URL)
        <input type="url" id="taskAttachmentInput" placeholder="https://..." />
      </label>

      <div class="modal-actions">
        <button id="taskCancelBtn">Annulla</button>
        <button id="taskSaveBtn">Salva</button>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <small>Ispirato a Apple Promemoria · Progetto di famiglia</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
